services:
  backend:
    build: ./backend
    restart: unless-stopped
    networks: [click125-net]
    environment:
      DATABASE_URL: sqlite:////app/data/click125.db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - db_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks: [click125-net]
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [click125-net, cloudflared]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, backend]

networks:
  click125-net:
  cloudflared:
    external: true  # pre-existing; shared with your cloudflared container

volumes:
  db_data:
