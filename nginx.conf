# nginx reverse proxy snippet for Click125 Tracker
# Place under your server {} block after setting up your domain + SSL

upstream click125_frontend {
    server localhost:3000;
}

upstream click125_backend {
    server localhost:8000;
}

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP → HTTPS (remove if no SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL (update paths or use Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # API requests → FastAPI backend
    location /api/ {
        proxy_pass         http://click125_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Everything else → SvelteKit frontend
    location / {
        proxy_pass         http://click125_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
